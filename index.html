<!DOCTYPE html>
<html>
<head>
  <title>Billions Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

      <style>
          body {
                margin: 0;
                      font-family: Arial;
                            background: #020617;
                                  color: white;
                                      }

                                          .hidden { display: none; }

                                              /* LOGIN */
                                                  #login {
                                                        text-align: center;
                                                              margin-top: 100px;
                                                                  }

                                                                      input {
                                                                            padding: 10px;
                                                                                  width: 250px;
                                                                                        margin: 10px;
                                                                                              border-radius: 5px;
                                                                                                    border: none;
                                                                                                        }

                                                                                                            button {
                                                                                                                  padding: 10px 20px;
                                                                                                                        background: #38bdf8;
                                                                                                                              border: none;
                                                                                                                                    border-radius: 5px;
                                                                                                                                          cursor: pointer;
                                                                                                                                                font-weight: bold;
                                                                                                                                                    }

                                                                                                                                                        /* APP LAYOUT */
                                                                                                                                                            .container {
                                                                                                                                                                  display: flex;
                                                                                                                                                                      }

                                                                                                                                                                          .sidebar {
                                                                                                                                                                                width: 220px;
                                                                                                                                                                                      background: #0f172a;
                                                                                                                                                                                            height: 100vh;
                                                                                                                                                                                                  padding: 20px;
                                                                                                                                                                                                      }

                                                                                                                                                                                                          .menu-item {
                                                                                                                                                                                                                padding: 10px;
                                                                                                                                                                                                                      margin: 10px 0;
                                                                                                                                                                                                                            cursor: pointer;
                                                                                                                                                                                                                                  border-radius: 5px;
                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                          .menu-item:hover {
                                                                                                                                                                                                                                                background: #1e293b;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                        .main {
                                                                                                                                                                                                                                                              flex: 1;
                                                                                                                                                                                                                                                                    padding: 20px;
                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                            .card {
                                                                                                                                                                                                                                                                                  background: #0f172a;
                                                                                                                                                                                                                                                                                        padding: 15px;
                                                                                                                                                                                                                                                                                              margin: 10px 0;
                                                                                                                                                                                                                                                                                                    border-radius: 10px;
                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                            .grid {
                                                                                                                                                                                                                                                                                                                  display: grid;
                                                                                                                                                                                                                                                                                                                        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                                                                                                                                                                                                                                                                                                                              gap: 10px;
                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                      .green { color: #22c55e; }
                                                                                                                                                                                                                                                                                                                                          .red { color: #ef4444; }

                                                                                                                                                                                                                                                                                                                                              @media(max-width:700px){
                                                                                                                                                                                                                                                                                                                                                    .container { flex-direction: column; }
                                                                                                                                                                                                                                                                                                                                                          .sidebar { width: 100%; height: auto; }
                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                </head>

                                                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                                                                                                                                <!-- LOGIN PAGE -->
                                                                                                                                                                                                                                                                                                                                                                <div id="login">
                                                                                                                                                                                                                                                                                                                                                                  <h1>🚀 Billions Login</h1>
                                                                                                                                                                                                                                                                                                                                                                    <input id="username" placeholder="Enter your name"><br>
                                                                                                                                                                                                                                                                                                                                                                      <button onclick="login()">Enter Dashboard</button>
                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                      <!-- APP -->
                                                                                                                                                                                                                                                                                                                                                                      <div id="app" class="hidden">

                                                                                                                                                                                                                                                                                                                                                                        <div class="container">

                                                                                                                                                                                                                                                                                                                                                                            <!-- SIDEBAR -->
                                                                                                                                                                                                                                                                                                                                                                                <div class="sidebar">
                                                                                                                                                                                                                                                                                                                                                                                      <h2>💰 Billions</h2>

                                                                                                                                                                                                                                                                                                                                                                                            <div class="menu-item" onclick="show('dashboard')">Dashboard</div>
                                                                                                                                                                                                                                                                                                                                                                                                  <div class="menu-item" onclick="show('wallet')">Wallet</div>
                                                                                                                                                                                                                                                                                                                                                                                                        <div class="menu-item" onclick="show('markets')">Markets</div>
                                                                                                                                                                                                                                                                                                                                                                                                              <div class="menu-item" onclick="show('profile')">Profile</div>
                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="menu-item" onclick="logout()">Logout</div>
                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- MAIN -->
                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="main">

                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- DASHBOARD -->
                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="dashboard">
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2>Welcome back, <span id="user"></span> 👋</h2>

                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="grid">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p>Total Balance</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h2 id="balance">$0</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <p>24h Volume</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <h2>$518.97</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p>Top Gainer</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h2 class="green">NEO +3.99%</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p>Top Loser</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <h2 class="red">BTC -2.10%</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- WALLET -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="wallet" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h2>💰 Wallet</h2>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>Balance: <span id="walletBalance">$0</span></p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <button onclick="deposit()">Deposit</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="withdraw()">Withdraw</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- MARKETS -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div id="markets" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h2>📊 Markets</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p>BTC: $65,000</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p>ETH: $3,200</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p>BNB: $540</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- PROFILE -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="profile" class="hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h2>👤 Profile</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>Name: <span id="profileName"></span></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p>Status: Verified ✅</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              let balance = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // LOGIN
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function login() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const name = document.getElementById("username").value;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(name === "") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      alert("Enter your name!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              localStorage.setItem("user", name);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("login").style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById("app").classList.remove("hidden");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadUser();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // LOAD USER
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function loadUser() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const user = localStorage.getItem("user");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("user").innerText = user;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("profileName").innerText = user;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // SWITCH SECTIONS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function show(section) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ["dashboard","wallet","markets","profile"].forEach(id => {
